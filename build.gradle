plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

group = 'org.example'
version = '1.1-SNAPSHOT'

javafx {
    version(21)
    modules('javafx.controls', 'javafx.graphics')
}

application {
    mainClass = 'org.example.sample.client.Game'
}